[settings]
experimental = true

[tools]
pnpm = "11.6.0"

[hooks]
postinstall = "pnpm i"

[tasks.dev]
description = "Start in development mode"
run = "pnpm dev"

[tasks.build]
description = "Build the extension"
run = "pnpm build"

[tasks.test]
description = "Run tests"
run = "pnpm test"

[tasks."test:e2e"]
description = "Run E2E tests"
run = "pnpm test:e2e"

[tasks.format]
description = "Format and type-check"
run = ["pnpm format", "pnpm typecheck"]

[tasks.zip]
description = "Create the extension zip"
run = "pnpm zip"
