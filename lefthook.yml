output:
  - summary
  - failure

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  jobs:
    - name: biome
      run: pnpm biome check --write --error-on-warnings --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    - name: typecheck
      run: pnpm typecheck

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
